<!DOCTYPE html>
<html lang="uz" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symbolix.uz — Matn va Fayl Konverter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        zinc: {
                            50: '#fafafa',
                            100: '#f4f4f5',
                            200: '#e4e4e7',
                            300: '#d4d4d8',
                            400: '#a1a1aa',
                            500: '#71717a',
                            600: '#52525b',
                            700: '#3f3f46',
                            800: '#27272a',
                            900: '#18181b',
                            950: '#09090b',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        textarea { resize: none; }
        .fade-enter { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: none; }
        }
    </style>
</head>
<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen flex flex-col transition-colors duration-200">

    <!-- Header -->
    <header class="bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between relative">
            <!-- Logo -->
            <div class="flex-shrink-0 flex items-center">
                <span class="text-xl font-bold tracking-tight">Symbolix.uz</span>
            </div>

            <!-- Tabs (Center absolute on desktop) -->
            <nav class="absolute left-1/2 -translate-x-1/2 flex gap-8 h-16 items-end hidden sm:flex">
                <button onclick="showTab('text')" class="relative h-16 flex items-center px-1 text-sm font-medium transition-colors" id="tab-text-btn">
                    <span id="tab-text-label" class="text-zinc-900 dark:text-zinc-100">Matn o'girgich</span>
                    <div id="tab-text-indicator" class="absolute bottom-0 left-0 right-0 h-0.5 bg-blue-500 rounded-t-full"></div>
                </button>
                <button onclick="showTab('file')" class="relative h-16 flex items-center px-1 text-sm font-medium transition-colors" id="tab-file-btn">
                    <span id="tab-file-label" class="text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100">Fayl konverter</span>
                    <div id="tab-file-indicator" class="absolute bottom-0 left-0 right-0 h-0.5 bg-blue-500 rounded-t-full hidden"></div>
                </button>
            </nav>

            <!-- Theme Toggle -->
            <button onclick="toggleTheme()" class="p-2 rounded-full text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100 transition-colors focus:outline-none">
                <!-- Sun Icon -->
                <svg id="icon-sun" class="hidden w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <!-- Moon Icon -->
                <svg id="icon-moon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>
        </div>
        <!-- Mobile Tabs (Visible only on small screens) -->
        <nav class="flex sm:hidden border-t border-zinc-200 dark:border-zinc-800">
            <button onclick="showTab('text')" class="flex-1 py-3 text-sm font-medium border-b-2 transition-colors border-blue-500 text-zinc-900 dark:text-zinc-100" id="tab-text-btn-mobile">
                Matn o'girgich
            </button>
            <button onclick="showTab('file')" class="flex-1 py-3 text-sm font-medium border-b-2 border-transparent text-zinc-500 dark:text-zinc-400" id="tab-file-btn-mobile">
                Fayl konverter
            </button>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8 flex flex-col items-center justify-center">

        <!-- ================= TEXT TAB ================= -->
        <div id="panel-text" class="w-full fade-enter">
            <div class="relative grid grid-cols-1 lg:grid-cols-2 gap-4 lg:gap-6 w-full">
                
                <!-- Swap Button (Absolute Center Desktop) -->
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none hidden lg:flex z-10">
                    <button onclick="swapMode()" class="pointer-events-auto bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl p-2.5 shadow-sm hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors text-zinc-500 dark:text-zinc-400 focus:outline-none" title="Almashtirish">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                        </svg>
                    </button>
                </div>

                <!-- Swap Button Mobile (Between Textareas) -->
                <div class="flex lg:hidden justify-center my-[-8px] z-10 relative">
                    <button onclick="swapMode()" class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-full p-2 shadow-sm text-zinc-500 focus:outline-none">
                        <svg class="w-4 h-4 transform rotate-90" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                        </svg>
                    </button>
                </div>

                <!-- Left Card (Input) -->
                <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl flex flex-col shadow-sm min-h-[400px]">
                    <div class="flex justify-between items-center px-5 py-4 border-b border-zinc-100 dark:border-zinc-800/50">
                        <span id="left-title" class="text-xs font-bold tracking-widest text-blue-600 dark:text-blue-500 uppercase">KIRILL</span>
                        <button onclick="clearText()" class="text-xs font-medium text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-200 transition-colors">
                            Matnni tozalash
                        </button>
                    </div>
                    <textarea id="input-text" oninput="onInputChange()" maxlength="5000"
                        class="w-full flex-1 p-5 bg-transparent outline-none text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 dark:placeholder-zinc-600 text-lg sm:text-base leading-relaxed" 
                        placeholder="Kirill yozuvidagi matnni kiriting..."></textarea>
                    <div class="px-5 py-3 text-xs font-medium text-zinc-400 dark:text-zinc-500 border-t border-zinc-100 dark:border-zinc-800/50">
                        <span id="char-count">0</span> / 5000
                    </div>
                </div>

                <!-- Right Card (Output) -->
                <div class="bg-zinc-50 dark:bg-zinc-900/40 border border-zinc-200 dark:border-zinc-800 rounded-2xl flex flex-col shadow-sm min-h-[400px]">
                    <div class="flex justify-between items-center px-5 py-4 border-b border-zinc-100 dark:border-zinc-800/50">
                        <span id="right-title" class="text-xs font-bold tracking-widest text-zinc-500 dark:text-zinc-400 uppercase">LOTIN</span>
                        <button onclick="copyResult()" id="copy-btn" class="text-xs font-medium text-blue-600 hover:text-blue-700 dark:text-blue-500 dark:hover:text-blue-400 transition-colors flex items-center gap-1.5">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                            </svg>
                            <span id="copy-text">Nusxa olish</span>
                        </button>
                    </div>
                    <div class="relative flex-1 flex flex-col">
                        <textarea id="output-text" readonly
                            class="w-full flex-1 p-5 bg-transparent outline-none text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 dark:placeholder-zinc-600 text-lg sm:text-base leading-relaxed" 
                            placeholder="Natija shu yerda chiqadi..."></textarea>
                        
                        <!-- Loading indicator overlay -->
                        <div id="loading-overlay" class="absolute inset-0 bg-zinc-50/50 dark:bg-zinc-900/50 backdrop-blur-[1px] flex items-center justify-center hidden">
                            <div class="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                        </div>
                    </div>
                    <div class="px-5 py-3 text-xs font-medium text-zinc-400 dark:text-zinc-500 border-t border-zinc-100 dark:border-zinc-800/50 flex justify-between">
                        <div>
                            <span id="output-char-count">0</span> / 5000
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- ================= FILE TAB ================= -->
        <div id="panel-file" class="w-full max-w-2xl mx-auto fade-enter hidden">
            
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold tracking-tight mb-2">Fayl Konverter</h2>
                <p class="text-zinc-500 dark:text-zinc-400 text-sm">PDF fayllarni bir zumda DOCX formatiga va yangi alifboga o'giring.</p>
            </div>

            <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl shadow-sm p-6 sm:p-8">
                
                <!-- Dropzone -->
                <div id="drop-zone" 
                    ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)"
                    onclick="document.getElementById('file-input').click()"
                    class="border-2 border-dashed border-zinc-300 dark:border-zinc-700 hover:border-blue-500 dark:hover:border-blue-500 rounded-xl p-10 flex flex-col items-center justify-center text-center cursor-pointer transition-colors bg-zinc-50 dark:bg-zinc-950/50">
                    
                    <input type="file" id="file-input" accept=".pdf" class="hidden" onchange="handleFileSelect(event)">
                    
                    <div id="dz-idle" class="flex flex-col items-center">
                        <div class="p-3 bg-blue-50 dark:bg-blue-900/20 text-blue-500 rounded-full mb-4">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12l-3-3m0 0l-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                            </svg>
                        </div>
                        <p class="text-sm font-semibold text-zinc-700 dark:text-zinc-300">PDF faylni bu yerga tashlang</p>
                        <p class="text-xs text-zinc-500 mt-1">yoki tanlash uchun bosing (Max: 5MB)</p>
                    </div>

                    <div id="dz-file" class="hidden flex flex-col items-center">
                        <div class="p-3 bg-green-50 dark:bg-green-900/20 text-green-500 rounded-full mb-4">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                            </svg>
                        </div>
                        <p id="file-name" class="text-sm font-semibold text-zinc-700 dark:text-zinc-300 max-w-[250px] truncate"></p>
                        <p id="file-size" class="text-xs text-zinc-500 mt-1"></p>
                        <button onclick="resetFile(event)" class="mt-4 text-xs font-medium text-red-500 hover:text-red-600 transition-colors">Faylni o'chirish</button>
                    </div>
                </div>

                <!-- Settings -->
                <div class="mt-6">
                    <label class="flex items-center gap-3 p-4 border border-zinc-200 dark:border-zinc-800 rounded-xl cursor-pointer hover:bg-zinc-50 dark:hover:bg-zinc-800/50 transition-colors">
                        <input type="checkbox" id="chk-translate" class="w-4 h-4 text-blue-600 bg-zinc-100 border-zinc-300 rounded focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-zinc-800 focus:ring-2 dark:bg-zinc-700 dark:border-zinc-600">
                        <div class="flex-1">
                            <span class="block text-sm font-medium text-zinc-900 dark:text-zinc-100">Yangi alifboga o'girish</span>
                            <span class="block text-xs text-zinc-500">Hujjat matni Lotin alifbosiga (Ş, Ç, Ö, Ğ) o'giriladi</span>
                        </div>
                    </label>
                </div>

                <!-- Messages -->
                <div id="file-error" class="hidden mt-4 text-sm text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/20 p-3 rounded-lg border border-red-200 dark:border-red-900/30 text-center"></div>
                <div id="file-success" class="hidden mt-4 text-sm text-green-600 dark:text-green-400 bg-green-50 dark:bg-green-900/20 p-3 rounded-lg border border-green-200 dark:border-green-900/30 text-center">Fayl muvaffaqiyatli yuklab olindi!</div>

                <!-- Action Button -->
                <button id="convert-btn" onclick="convertFile()" disabled class="mt-6 w-full flex items-center justify-center gap-2 py-3 px-4 bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 text-sm font-semibold rounded-xl hover:bg-zinc-800 dark:hover:bg-zinc-100 disabled:opacity-50 disabled:cursor-not-allowed transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-zinc-900 dark:focus:ring-white dark:focus:ring-offset-zinc-900">
                    <span id="btn-label">DOCX ga o'girish</span>
                    <div id="btn-spinner" class="hidden w-4 h-4 border-2 border-white dark:border-zinc-900 border-t-transparent rounded-full animate-spin"></div>
                </button>

            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="py-6 mt-auto">
        <div class="text-center text-xs font-medium text-zinc-400 dark:text-zinc-500">
            2026 Symbolix.uz - Bepul va tezkor vosita by Devesanoff
        </div>
    </footer>

    <script>
        // --- Theme Management ---
        const html = document.documentElement;
        const sun = document.getElementById('icon-sun');
        const moon = document.getElementById('icon-moon');

        function applyTheme(isDark) {
            if (isDark) {
                html.classList.add('dark');
                sun.classList.remove('hidden');
                moon.classList.add('hidden');
            } else {
                html.classList.remove('dark');
                sun.classList.add('hidden');
                moon.classList.remove('hidden');
            }
        }

        function toggleTheme() {
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            applyTheme(!isDark);
        }

        // Initialize Theme
        const storedTheme = localStorage.getItem('theme');
        if (storedTheme) {
            applyTheme(storedTheme === 'dark');
        } else {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(prefersDark);
        }


        // --- Tabs Management ---
        function showTab(tabName) {
            const isText = tabName === 'text';
            
            // Desktop Tabs
            document.getElementById('tab-text-label').className = isText ? 'text-zinc-900 dark:text-zinc-100' : 'text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100';
            document.getElementById('tab-file-label').className = !isText ? 'text-zinc-900 dark:text-zinc-100' : 'text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100';
            
            document.getElementById('tab-text-indicator').classList.toggle('hidden', !isText);
            document.getElementById('tab-file-indicator').classList.toggle('hidden', isText);

            // Mobile Tabs
            document.getElementById('tab-text-btn-mobile').className = `flex-1 py-3 text-sm font-medium border-b-2 transition-colors ${isText ? 'border-blue-500 text-zinc-900 dark:text-zinc-100' : 'border-transparent text-zinc-500 dark:text-zinc-400'}`;
            document.getElementById('tab-file-btn-mobile').className = `flex-1 py-3 text-sm font-medium border-b-2 transition-colors ${!isText ? 'border-blue-500 text-zinc-900 dark:text-zinc-100' : 'border-transparent text-zinc-500 dark:text-zinc-400'}`;

            // Panels
            document.getElementById('panel-text').classList.toggle('hidden', !isText);
            document.getElementById('panel-file').classList.toggle('hidden', isText);
        }


        // --- Text Converter Logic ---
        let currentMode = 'kl'; // 'kl' = Kirill to Lotin, 'lk' = Lotin to Kirill
        let debounceTimer = null;
        
        const inputArea = document.getElementById('input-text');
        const outputArea = document.getElementById('output-text');
        const inputCount = document.getElementById('char-count');
        const outputCount = document.getElementById('output-char-count');
        
        function updateCounts() {
            inputCount.innerText = inputArea.value.length;
            outputCount.innerText = outputArea.value.length;
        }

        function swapMode() {
            currentMode = currentMode === 'kl' ? 'lk' : 'kl';
            const isKL = currentMode === 'kl';
            
            // Update UI Labels
            document.getElementById('left-title').innerText = isKL ? 'KIRILL' : 'LOTIN';
            document.getElementById('right-title').innerText = isKL ? 'LOTIN' : 'KIRILL';
            
            // Adjust coloring of active/inactive labels
            if (isKL) {
                document.getElementById('left-title').className = "text-xs font-bold tracking-widest text-blue-600 dark:text-blue-500 uppercase";
                document.getElementById('right-title').className = "text-xs font-bold tracking-widest text-zinc-500 dark:text-zinc-400 uppercase";
            } else {
                document.getElementById('left-title').className = "text-xs font-bold tracking-widest text-zinc-500 dark:text-zinc-400 uppercase";
                document.getElementById('right-title').className = "text-xs font-bold tracking-widest text-blue-600 dark:text-blue-500 uppercase";
            }

            inputArea.placeholder = isKL ? 'Kirill yozuvidagi matnni kiriting...' : 'Lotin yozuvidagi matnni kiriting...';
            
            // Swap texts
            const temp = inputArea.value;
            inputArea.value = outputArea.value;
            outputArea.value = temp;
            
            updateCounts();
            
            if (inputArea.value.trim() !== '') {
                triggerConvert();
            }
        }

        function clearText() {
            inputArea.value = '';
            outputArea.value = '';
            updateCounts();
            inputArea.focus();
        }

        function onInputChange() {
            updateCounts();
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(triggerConvert, 300);
        }

        async function triggerConvert() {
            const text = inputArea.value;
            if (!text.trim()) {
                outputArea.value = '';
                updateCounts();
                return;
            }

            const endpoint = currentMode === 'kl' ? '/api/v1/convert/krill-lotin' : '/api/v1/convert/lotin-krill';
            const overlay = document.getElementById('loading-overlay');
            
            overlay.classList.remove('hidden');
            
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                outputArea.value = data.result || '';
            } catch (e) {
                outputArea.value = 'Xatolik yuz berdi. Iltimos, qayta urinib ko\'ring.';
            } finally {
                overlay.classList.add('hidden');
                updateCounts();
            }
        }

        function copyResult() {
            if (!outputArea.value) return;
            navigator.clipboard.writeText(outputArea.value).then(() => {
                const copyText = document.getElementById('copy-text');
                const originalText = copyText.innerText;
                copyText.innerText = 'Nusxa olindi!';
                document.getElementById('copy-btn').classList.add('text-green-600', 'dark:text-green-400');
                
                setTimeout(() => {
                    copyText.innerText = originalText;
                    document.getElementById('copy-btn').classList.remove('text-green-600', 'dark:text-green-400');
                }, 2000);
            });
        }


        // --- File Converter Logic ---
        let selectedFile = null;
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const btnConvert = document.getElementById('convert-btn');
        const errFile = document.getElementById('file-error');
        const succFile = document.getElementById('file-success');

        function handleDragOver(e) {
            e.preventDefault();
            dropZone.classList.add('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/10');
        }

        function handleDragLeave(e) {
            dropZone.classList.remove('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/10');
        }

        function handleDrop(e) {
            e.preventDefault();
            handleDragLeave(e);
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                processFile(e.dataTransfer.files[0]);
            }
        }

        function handleFileSelect(e) {
            if (e.target.files && e.target.files.length > 0) {
                processFile(e.target.files[0]);
            }
        }

        function processFile(file) {
            errFile.classList.add('hidden');
            succFile.classList.add('hidden');

            if (file.type !== 'application/pdf') {
                errFile.innerText = 'Faqat PDF fayllar qabul qilinadi.';
                errFile.classList.remove('hidden');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                errFile.innerText = 'Fayl hajmi 5MB dan oshmasligi kerak.';
                errFile.classList.remove('hidden');
                return;
            }

            selectedFile = file;
            document.getElementById('dz-idle').classList.add('hidden');
            document.getElementById('dz-file').classList.remove('hidden');
            document.getElementById('file-name').innerText = file.name;
            document.getElementById('file-size').innerText = (file.size / 1024 / 1024).toFixed(2) + ' MB';
            btnConvert.disabled = false;
        }

        function resetFile(e) {
            e.stopPropagation(); // prevent opening file dialog
            selectedFile = null;
            fileInput.value = '';
            document.getElementById('dz-idle').classList.remove('hidden');
            document.getElementById('dz-file').classList.add('hidden');
            btnConvert.disabled = true;
            errFile.classList.add('hidden');
            succFile.classList.add('hidden');
        }

        async function convertFile() {
            if (!selectedFile) return;

            const translate = document.getElementById('chk-translate').checked;
            const url = `/api/v1/convert/pdf-docx${translate ? '?translate=true' : ''}`;
            
            const btnLabel = document.getElementById('btn-label');
            const btnSpinner = document.getElementById('btn-spinner');

            btnConvert.disabled = true;
            btnLabel.innerText = 'Bajarilmoqda...';
            btnSpinner.classList.remove('hidden');
            errFile.classList.add('hidden');
            succFile.classList.add('hidden');

            const form = new FormData();
            form.append('file', selectedFile);

            try {
                const res = await fetch(url, { method: 'POST', body: form });
                if (!res.ok) throw new Error();
                
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'symbolix_converted.docx';
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(a.href);

                succFile.classList.remove('hidden');
            } catch (e) {
                errFile.innerText = 'Faylni o\'zgartirishda xatolik yuz berdi.';
                errFile.classList.remove('hidden');
            } finally {
                btnLabel.innerText = 'DOCX ga o\'girish';
                btnSpinner.classList.add('hidden');
                btnConvert.disabled = false;
            }
        }
    </script>
</body>
</html>
